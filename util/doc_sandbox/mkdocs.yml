site_name: EXOSIMS-Sandbox
nav:
    - Home: index.md
    - Galleries:
        - Binned Ensemble Galleries: binned-ensemble-gallery.md
        - Ensemble Path Galleries: path-ensemble-gallery.md
        - Single DRM Galleries: single-drm-gallery.md
    - Execution: execution.md
    - Script Index: script_index.md
    - Key Tools: impl_index.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["..", "../reduce_drm_tools"]
          # Python-specific options (e.g., show source code)
          options:
            docstring_options:
              warn_missing_types: false
            show_source: true
        shell:
          # Shell-specific options -- placeholder
          options:
            setup_commands:
              - source mkdocs_sh_setup.sh

  - gen-files:
      scripts:
        - gen_pages.py  # or any other name or path
            

#theme: 
#  name: "readthedocs"

theme: 
  name: "material"
  features:
    - navigation.tabs
